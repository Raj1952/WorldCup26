name: Daily Refresh

# Runs every day at 06:00 UTC — well after midnight across all WC2026 host
# time zones (ET/CT/MT/PT), so previous-day results are available in feeds.
# Manual trigger is available for immediate re-runs or testing.
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

# Needs write access to commit and push updated outputs back to the repo.
permissions:
  contents: write

jobs:
  refresh:
    name: Ingest → train → predict → commit
    runs-on: ubuntu-latest
    timeout-minutes: 30          # hard cap; pipeline typically runs in ~5 min

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1         # shallow clone is fine; we only push one commit

      # ── Python ─────────────────────────────────────────────────────────────
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # ── Compute weekly cache key ────────────────────────────────────────────
      - name: Compute weekly cache key
        id: week
        run: echo "val=$(date -u '+%Y-W%V')" >> "$GITHUB_OUTPUT"

      # ── pip cache ──────────────────────────────────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      # ── Raw data cache ─────────────────────────────────────────────────────
      # Cache data/raw/ (gitignored historical CSVs) — rotates weekly so
      # fresh data is pulled every seven days without re-downloading daily.
      # Do NOT cache data/tempo.db — it is committed to the repo and comes
      # from git checkout; caching it would overwrite the live version.
      - name: Cache raw historical data
        uses: actions/cache@v5
        with:
          path: data/raw/
          key: tempo-raw-${{ steps.week.outputs.val }}
          restore-keys: tempo-raw-

      # ── Install ─────────────────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Pipeline ───────────────────────────────────────────────────────────
      - name: Run refresh pipeline
        env:
          # C2 checkpoint: register at football-data.org (free) and add this
          # secret in repo Settings → Secrets → Actions. Without it the
          # pipeline falls back to the openfootball public feed automatically.
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          # Optional: Supermemory persistence
          SUPERMEMORY_API_KEY: ${{ secrets.SUPERMEMORY_API_KEY }}
        run: python pipelines/refresh.py

      # ── Commit outputs ─────────────────────────────────────────────────────
      # Stages all app-readable outputs: predictions.parquet, the SQLite
      # database, model artifacts, and report parquets.
      # Skips the commit entirely if nothing changed (idempotent runs).
      # [skip ci] in the message prevents this commit from re-triggering
      # the workflow.
      - name: Commit updated outputs
        run: |
          git config user.name  "tempo-bot"
          git config user.email "tempo-bot@users.noreply.github.com"

          git add predictions.parquet                                  || true
          git add data/tempo.db                                        || true
          git add artifacts/models/                                    || true
          git add artifacts/reports/holdout_summary.parquet            || true
          git add artifacts/reports/holdout_calibration.parquet        || true
          git add artifacts/reports/holdout_confidence.parquet         || true

          # Exit cleanly if nothing changed (e.g. no new results today)
          if git diff --staged --quiet; then
            echo "No changes to commit — outputs are up to date."
            exit 0
          fi

          git commit -m "chore: daily refresh $(date -u '+%Y-%m-%d') [skip ci]"
          git push
