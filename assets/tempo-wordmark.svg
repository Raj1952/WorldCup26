<svg xmlns="http://www.w3.org/2000/svg" viewBox="26 36 896 289"
     fill="none" role="img" aria-label="Tempo">
  <!-- T: two filled rects — crossbar + stem -->
  <g fill="currentColor" stroke="none">
    <rect x="30" y="40" width="156" height="50" rx="11"/>
    <rect x="83" y="40" width="50"  height="200" rx="11"/>
  </g>
  <!-- e m p o: stroke letterforms -->
  <g fill="none" stroke="currentColor" stroke-width="42"
     stroke-linecap="round" stroke-linejoin="round">
    <!-- e: crossbar + open bowl (counter-clockwise large arc) -->
    <path d="M246 170 L344 170"/>
    <path d="M344 170 A49 49 0 1 0 323.1 210.1"/>
    <!-- m: two humped arches -->
    <path d="M400 240 L400 140 A45 40 0 0 1 490 140 L490 240
             M490 140 A45 40 0 0 1 580 140 L580 240"/>
    <!-- p: descending stem + bowl -->
    <path d="M646 100 L646 300"/>
    <circle cx="695" cy="170" r="49"/>
    <!-- o: ring -->
    <circle cx="850" cy="170" r="49"/>
  </g>
  <!-- o accent: short diagonal tick + dot -->
  <g stroke="currentColor" stroke-width="14" stroke-linecap="round" fill="none">
    <path d="M850 196 L869 126"/>
  </g>
  <circle cx="850" cy="196" r="10" fill="currentColor"/>
</svg>
